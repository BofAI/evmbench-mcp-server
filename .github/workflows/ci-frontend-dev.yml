name: Frontend Docker Push

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: meta
        run: |
          echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ secrets.DOCKERHUB_USERNAME }}/evmbench-frontend" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE=https://tm-tvmbench.endjgfsv.link
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.frontend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max