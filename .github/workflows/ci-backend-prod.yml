# Build backend, base, and worker images and push to Docker Hub.
# Repo Secrets required: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (Docker Hub PAT).
# EC2: set DOCKER_IMAGE, INSTANCER_WORKER_IMAGE (see backend/docs/DEPLOY-EC2.md).

name: Docker Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image names
        id: meta
        run: |
          echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "backend_image=${{ secrets.DOCKERHUB_USERNAME }}/evmbench-backend" >> $GITHUB_OUTPUT
          echo "base_image=${{ secrets.DOCKERHUB_USERNAME }}/evmbench-base" >> $GITHUB_OUTPUT
          echo "worker_image=${{ secrets.DOCKERHUB_USERNAME }}/evmbench-worker" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/base/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.base_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.base_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/docker/worker/Dockerfile
          build-args: |
            BASE_IMAGE=${{ steps.meta.outputs.base_image }}:latest
          push: true
          tags: |
            ${{ steps.meta.outputs.worker_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.worker_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
